# ACEest Fitness & Gym - CI/CD Pipeline
# Triggered on every push and pull_request

name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (syntax / compile check)
        run: python -m py_compile app.py

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: build-and-lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: aceest-fitness:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    name: Automated Testing
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image for test
        run: docker build -t aceest-fitness:latest .

      - name: Run Pytest inside container
        run: docker run --rm aceest-fitness:latest pytest tests/ -v
